<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';">
    <title>JARVIS Orb</title>
    <link rel="stylesheet" href="widget.css">
  </head>
  <body>
    <div class="drag-zone">
      <button id="orb" class="orb" title="Click to open JARVIS · Drag anywhere to move · Scroll to resize">
        <span class="ring ring-a"></span><span class="ring ring-b"></span><span class="ring ring-c"></span>
        <span class="orb-core"></span>
        <i id="orb-label">READY</i>
      </button>
    </div>
    <script src="widget.js"></script>
  </body>
</html>
