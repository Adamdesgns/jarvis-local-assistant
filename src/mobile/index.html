<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>JARVIS</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icon-180.png">
  <link rel="stylesheet" href="/mobile.css">
</head>
<body class="pairing">
  <header class="bar bar-top"><h1 class="title">J.A.R.V.I.S.</h1><span id="conn-dot" class="dot"></span></header>

  <section id="screen-pairing" class="screen-pairing">
    <div class="card stack">
      <p class="text-dim">Scan the QR code on the desktop (Settings → MOBILE → Pair a phone), or enter the 6-digit code:</p>
      <input id="pair-code" class="field field-code" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code">
      <button id="pair-btn" class="btn btn-primary btn-block">PAIR</button>
      <p id="pair-error" class="error" hidden></p>
    </div>
  </section>

  <section id="screen-chat" hidden>
    <div id="thread" class="thread"></div>
    <div id="agent-status" class="status" hidden></div>
    <footer class="bar bar-bottom composer-bar">
      <textarea id="composer" class="field composer-field" rows="1" placeholder="Message JARVIS…"></textarea>
      <button id="send-btn" class="btn btn-secondary btn-icon" aria-label="Send">➤</button>
      <button id="mic-btn" class="btn btn-primary btn-icon btn-mic" aria-label="Hold to talk">🎙</button>
    </footer>
  </section>

  <section id="screen-cameras" class="screen-empty" hidden>
    <div class="stack">
      <p class="text-dim">Cameras are coming soon.</p>
    </div>
  </section>

  <section id="screen-send" class="screen-empty" hidden>
    <div class="stack">
      <p class="text-dim">Send is coming soon.</p>
    </div>
  </section>

  <section id="screen-offline" class="screen-offline" hidden>
    <p>JARVIS is unreachable — is the PC awake?</p>
    <button id="retry-btn" class="btn btn-primary">RETRY</button>
  </section>

  <nav id="tab-bar" class="bar bar-bottom tab-bar" hidden>
    <button id="tab-chat" class="tab-item" role="tab" aria-selected="false" aria-controls="screen-chat" data-screen="chat">
      <span class="tab-glyph" aria-hidden="true">💬</span>
      <span class="tab-label">Chat</span>
    </button>
    <button id="tab-cameras" class="tab-item" role="tab" aria-selected="false" aria-controls="screen-cameras" data-screen="cameras">
      <span class="tab-glyph" aria-hidden="true">📷</span>
      <span class="tab-label">Cameras</span>
    </button>
    <button id="tab-send" class="tab-item" role="tab" aria-selected="false" aria-controls="screen-send" data-screen="send">
      <span class="tab-glyph" aria-hidden="true">📤</span>
      <span class="tab-label">Send</span>
    </button>
  </nav>

  <script src="/mobile.js"></script>
</body>
</html>
